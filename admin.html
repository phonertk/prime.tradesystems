<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPulse - Central Control Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #080b11;
            --bg-card: #0f172a;
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 10%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
        }

        /* Modal ล็อกอิน PIN/Passcode */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 11, 17, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .login-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .login-box h3 {
            color: var(--accent-cyan);
            margin-bottom: 8px;
            font-size: 1.5rem;
        }

        .login-box p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background-color: #020617;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .login-box button {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 12px;
            display: none;
        }

        /* Main Dashboard Content */
        .dashboard-content {
            display: none; /* เปิดเมื่อยืนยันรหัสถูกต้อง */
            width: 100%;
            max-width: 850px;
        }

        .admin-card {
            background-color: var(--bg-card);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        h2 { font-size: 1.6rem; color: #fff; }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .back-link:hover { color: var(--accent-cyan); }

        .section-title {
            color: var(--accent-cyan);
            font-size: 1.1rem;
            font-weight: 700;
            margin: 30px 0 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background-color: #020617;
            color: #fff;
            font-size: 0.95rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .btn-save {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #fff;
            border: none;
            padding: 16px 28px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1.05rem;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(6, 182, 212, 0.3);
        }

        .btn-save:hover { opacity: 0.9; }

        .status-msg {
            margin-top: 20px;
            text-align: center;
            font-size: 0.95rem;
            color: #4ade80;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- 🔒 POPUP ยืนยันรหัสผ่านเข้า Admin -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h3>🔒 CyberPulse Central Control</h3>
            <p>กรุณากรอกรหัสผ่านเพื่อเข้าสู่ระบบปรับแต่งหน้าเว็บ</p>
            <form id="passcode-form">
                <input type="password" id="passcode-input" placeholder="กรอกรหัสผ่าน..." required autofocus>
                <button type="submit">Unlock Dashboard</button>
            </form>
            <div class="error-msg" id="login-error">❌ รหัสผ่านไม่ถูกต้อง! กรุณาลองใหม่อีกครั้ง</div>
        </div>
    </div>

    <!-- ⚙️ หน้าหลังบ้าน จัดการข้อมูลแบบละเอียด -->
    <div class="dashboard-content" id="dashboard-content">
        <div class="admin-card">
            <div class="header">
                <h2>⚡ CyberPulse Control Center</h2>
                <a href="index.html" class="back-link">← ออกจากระบบ / กลับหน้าเว็บ</a>
            </div>

            <form id="settings-form">
                <div class="section-title">🌐 Brand & Hero Banner Settings</div>
                <div class="form-group">
                    <label for="company_name">ชื่อแบรนด์ / บริษัท</label>
                    <input type="text" id="company_name" value="CYBERPULSE">
                </div>

                <div class="form-group">
                    <label for="hero_badge">ข้อความ Badge หัวข้อ</label>
                    <input type="text" id="hero_badge" value="✨ NEXT-GEN IT INFRASTRUCTURE">
                </div>

                <div class="form-group">
                    <label for="hero_title">พาดหัวหลัก (Hero Title - รองรับ <span> ซ่อนคำไฮไลท์)</label>
                    <input type="text" id="hero_title" value="Empowering Enterprises with Smart Technology Solutions">
                </div>

                <div class="form-group">
                    <label for="hero_subtitle">คำบรรยายหลัก (Hero Subtitle)</label>
                    <textarea id="hero_subtitle" rows="3">We deliver high-performance Cloud Systems, Next-Gen Cybersecurity, and AI-Driven Custom Software tailored to accelerate your business growth.</textarea>
                </div>

                <div class="section-title">📊 Stats Dashboard Counters</div>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="stat1_val">Stat 1 Value</label>
                        <input type="text" id="stat1_val" value="99.99%">
                    </div>
                    <div class="form-group">
                        <label for="stat1_lbl">Stat 1 Label</label>
                        <input type="text" id="stat1_lbl" value="Uptime SLA Guaranteed">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="stat2_val">Stat 2 Value</label>
                        <input type="text" id="stat2_val" value="500+">
                    </div>
                    <div class="form-group">
                        <label for="stat2_lbl">Stat 2 Label</label>
                        <input type="text" id="stat2_lbl" value="Enterprise Clients">
                    </div>
                </div>

                <div class="section-title">🛠️ Services Content</div>
                <div class="form-group">
                    <label for="s1_title">บริการ 1: หัวข้อ</label>
                    <input type="text" id="s1_title" value="Cloud & DevOps Acceleration">
                </div>
                <div class="form-group">
                    <label for="s1_desc">บริการ 1: รายละเอียด</label>
                    <textarea id="s1_desc" rows="2">Migrate, scale, and optimize multi-cloud architectures with automated CI/CD pipelines and zero downtime.</textarea>
                </div>

                <div class="section-title">📞 Contact Footer</div>
                <div class="form-group">
                    <label for="contact_info">ข้อมูลติดต่อ (อีเมล & เบอร์โทร)</label>
                    <input type="text" id="contact_info" value="📧 contact@cyberpulse-it.com | 📞 +66 2 123 4567">
                </div>

                <button type="submit" class="btn-save">💾 บันทึกและอัปเดตข้อมูล Real-time</button>
            </form>

            <div class="status-msg" id="status-msg"></div>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 🔑 1. กำหนดรหัสผ่านเข้า Admin (เปลี่ยนตามต้องการได้ตรงนี้)
        // ----------------------------------------------------
        const ADMIN_PASSCODE = '123456'; 

        document.getElementById('passcode-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const inputPass = document.getElementById('passcode-input').value;
            const errorDiv = document.getElementById('login-error');

            if (inputPass === ADMIN_PASSCODE) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';
            } else {
                errorDiv.style.display = 'block';
                document.getElementById('passcode-input').value = '';
            }
        });

        // ----------------------------------------------------
        // 🔑 2. ตั้งค่า Supabase Credentials
        // ----------------------------------------------------
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

        document.getElementById('settings-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const statusDiv = document.getElementById('status-msg');
            statusDiv.innerText = "กำลังอัปเดตไปยัง Supabase...";

            const fields = [
                'company_name', 'hero_badge', 'hero_title', 'hero_subtitle',
                'stat1_val', 'stat1_lbl', 'stat2_val', 'stat2_lbl',
                's1_title', 's1_desc', 'contact_info'
            ];
            
            const updates = fields.map(id => ({
                key: id,
                value: document.getElementById(id).value
            }));

            if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
                const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                await supabase.from('site_settings').upsert(updates, { onConflict: 'key' });
                statusDiv.innerText = "✅ อัปเดตข้อมูลหน้าบ้านแบบ Real-time เรียบร้อยแล้ว!";
            } else {
                setTimeout(() => {
                    statusDiv.innerText = "💡 (โหมดตัวอย่าง) บันทึกสำเร็จ! เมื่อเชื่อม Supabase แล้ว ข้อมูลจะเปลี่ยนไปหน้าบ้านทันที";
                }, 500);
            }
        });
    </script>
</body>
</html>
